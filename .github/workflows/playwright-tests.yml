name: Playwright Tests

on:
  push:
    branches: [main]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js with Yarn caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies using Yarn with immutable flags
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers with system dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run Playwright tests in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload HTML report artifact (always)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      # Upload Playwright traces artifact (always)
      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip

      # Send Teams notification on failure
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H 'Content-Type: application/json' -d "{\"text\":\"Playwright tests failed!\n\nPull request title: ${{ github.event.pull_request.title }}\nPR author: ${{ github.event.pull_request.user.login }}\nBranch name: ${{ github.head_ref }}\nWorkflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.TEAMS_WEBHOOK_URL }}