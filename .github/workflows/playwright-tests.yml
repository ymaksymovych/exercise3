name: Playwright Tests

on:
  push:
    branches: [main]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js with Yarn caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies using Yarn with immutable flags
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers with system dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run Playwright tests in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload HTML report artifact (always)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      # Upload Playwright traces artifact (always)
      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip

      # Send Teams notification on failure
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -H 'Content-Type: application/json' -d "{\"text\":\"Playwright tests failed!\n\nPull request title: ${{ github.event.pull_request.title }}\nPR author: ${{ github.event.pull_request.user.login }}\nBranch name: ${{ github.head_ref }}\nWorkflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.TEAMS_WEBHOOK_URL }}

      # Prepare history for GitHub Pages
      - name: Prepare history
        if: always() && github.ref == 'refs/heads/main'
        run: |
          # Fetch previous history if exists
          git fetch origin gh-pages --quiet || true
          if git show gh-pages:history.json > /dev/null 2>&1; then
            git show gh-pages:history.json > playwright-report/history.json
          else
            echo '[]' > playwright-report/history.json
          fi
          # Get test counts from summary.json
          PASSED=$(jq '.passed // 0' playwright-report/summary.json 2>/dev/null || echo 0)
          FAILED=$(jq '.failed // 0' playwright-report/summary.json 2>/dev/null || echo 0)
          SKIPPED=$(jq '.skipped // 0' playwright-report/summary.json 2>/dev/null || echo 0)
          # Append new record
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          jq --arg timestamp "$TIMESTAMP" --arg runUrl "$RUN_URL" --arg commitSha "$GITHUB_SHA" --arg ref "$GITHUB_REF" --arg conclusion "${{ job.status }}" --argjson passed "$PASSED" --argjson failed "$FAILED" --argjson skipped "$SKIPPED" '. + [{"timestamp": $timestamp, "runUrl": $runUrl, "commitSha": $commitSha, "ref": $ref, "conclusion": $conclusion, "passed": $passed, "failed": $failed, "skipped": $skipped}]' playwright-report/history.json > temp.json && mv temp.json playwright-report/history.json

      # Prepare Pages content (dereference symlinks)
      - name: Prepare Pages content
        if: always() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p pages-content
          cp -rL playwright-report/* pages-content/

      # Upload Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js with Yarn caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Run dependency vulnerability scan
      - name: Run security scan
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          yarn audit --level high --level critical >> $GITHUB_STEP_SUMMARY